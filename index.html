<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIキャラチャット</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #0f1115;
  color: white;
  height: 100vh;
  overflow: hidden;
}

/* 背景 */
.bg {
  position: fixed;
  inset: 0;
  background: url("aizawa.jpg") center/cover no-repeat;
  filter: blur(18px) brightness(0.4);
  z-index: 0;
}

/* キャラ */
.character {
  position: fixed;
  right: 0;
  bottom: 0;
  height: 100%;
  z-index: 1;
  pointer-events: none;
}

/* チャット */
.chat {
  position: fixed;
  left: 0;
  top: 0;
  width: 45%;
  height: calc(100% - 90px);
  overflow-y: auto;
  padding: 20px;
  box-sizing: border-box;
  z-index: 2;

  background: linear-gradient(
    to right,
    rgba(20,20,25,0.95),
    rgba(20,20,25,0.8),
    rgba(20,20,25,0)
  );
}

/* メッセージ */
.message {
  max-width: 80%;
  margin-bottom: 15px;
  padding: 12px 16px;
  border-radius: 18px;
  line-height: 1.6;
  white-space: pre-wrap;
}

.user {
  background: #ff4fa3;
  margin-left: auto;
}

.ai {
  background: rgba(255,255,255,0.15);
}

/* 上部バー */
.top-bar {
  position: fixed;
  top: 0;
  left: 0;
  width: 45%;
  height: 50px;
  display: flex;
  align-items: center;
  padding: 0 10px;
  gap: 10px;
  z-index: 3;

  background: rgba(20,20,25,0.95);
  border-bottom: 1px solid rgba(255,255,255,0.1);
}

/* セレクト */
select {
  padding: 6px;
  border-radius: 6px;
  border: none;
}

/* 入力欄 */
.input-area {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 45%;
  height: 90px;
  display: flex;
  align-items: center;
  padding: 10px;
  gap: 10px;
  z-index: 3;

  background: rgba(20,20,25,0.95);
}

/* テキスト */
textarea {
  flex: 1;
  height: 60px;
  resize: none;
  border-radius: 10px;
  border: none;
  outline: none;
  padding: 10px;
  background: #fff;
  color: #000;
}

/* ボタン */
button {
  height: 60px;
  padding: 0 18px;
  border-radius: 10px;
  border: none;
  background: #ff4fa3;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="bg" id="bg"></div>
<img src="aizawa.png" class="character" id="characterImg">

<!-- 上部UI -->
<div class="top-bar">
  <select id="characterSelect">
    <option value="aizawa">相澤仁美</option>
    <option value="ogura">小倉優香</option>
    <option value="kishi">岸明日香</option>
  </select>
</div>

<!-- チャット -->
<div id="chat" class="chat"></div>

<!-- 入力 -->
<div class="input-area">
  <textarea id="input" placeholder="メッセージ入力"></textarea>
  <button id="sendBtn">送信</button>
</div>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("input");
const sendBtn = document.getElementById("sendBtn");

const characterSelect = document.getElementById("characterSelect");
const characterImg = document.getElementById("characterImg");
const bg = document.getElementById("bg");

let history = [];

/* キャラ変更 */
function changeCharacter() {
  const char = characterSelect.value;

  characterImg.src = char + ".png";
  bg.style.backgroundImage = `url(${char}.jpg)`;

  // 会話リセット（任意）
  history = [];
  chat.innerHTML = "";
}

characterSelect.addEventListener("change", changeCharacter);

/* メッセージ追加 */
function addMessage(text, type) {
  const div = document.createElement("div");
  div.className = "message " + type;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

/* 送信 */
async function send() {
  const text = input.value.trim();
  if (!text) return;

  addMessage(text, "user");
  input.value = "";

  history.push({ role: "user", content: text });
  history = history.slice(-6);

  const loading = document.createElement("div");
  loading.className = "message ai";
  loading.textContent = "考え中...";
  chat.appendChild(loading);
  chat.scrollTop = chat.scrollHeight;

  try {
    const character = characterSelect.value;

    const res = await fetch("/api/deepseek", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        history,
        character
      })
    });

    const data = await res.json();
    loading.remove();

    if (!res.ok) {
      addMessage("エラー: " + JSON.stringify(data), "ai");
      return;
    }

    addMessage(data.reply, "ai");
    history.push({ role: "assistant", content: data.reply });

  } catch (e) {
    loading.remove();
    addMessage("通信エラー", "ai");
  }
}

/* イベント */
sendBtn.onclick = send;

input.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey && !e.isComposing) {
    e.preventDefault();
    send();
  }
});
</script>

</body>
</html>
