<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>グラドルAIチャット（DeepSeek版）</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  display: flex;
  height: 100vh;
  background: #fff0f5;
}

.sidebar {
  width: 220px;
  background: #ffe4ec;
  border-right: 1px solid #f8cdd8;
  padding: 10px;
}

.main {
  flex: 1;
  display: flex;
  flex-direction: column;
}

.chat {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
}

.message {
  margin-bottom: 15px;
  max-width: 70%;
  padding: 12px;
  border-radius: 12px;
  line-height: 1.6;
  white-space: pre-wrap;
}

.user {
  background: #ff69b4;
  color: white;
  margin-left: auto;
}

.ai {
  background: #ffe4ec;
  color: #333;
}

/* ローディング */
.loading {
  font-style: italic;
  color: #999;
}

.dots::after {
  content: "";
  animation: dots 1.5s infinite;
}

@keyframes dots {
  0% { content: ""; }
  33% { content: "."; }
  66% { content: ".."; }
  100% { content: "..."; }
}

.controls {
  padding: 10px;
  border-top: 1px solid #f8cdd8;
  background: #fff5f8;
}

.input-area {
  display: flex;
}

input {
  flex: 1;
  padding: 10px;
  font-size: 16px;
  border: 1px solid #f8cdd8;
  border-radius: 6px;
}

button {
  padding: 10px 15px;
  margin-left: 5px;
  cursor: pointer;
  border: none;
  background: #ff69b4;
  color: white;
  border-radius: 6px;
}

button:hover {
  background: #ff4fa3;
}
</style>
</head>

<body>

<div class="sidebar">
  <h3>キャラ</h3>
  <select id="character">
    <option value="aizawa">強気</option>
    <option value="tejima">優しい</option>
    <option value="matsugane">大人</option>
    <option value="wacchi">元気</option>
    <option value="rangiku">妖艶</option>
  </select>
</div>

<div class="main">
  <div id="chat" class="chat"></div>

  <div class="controls">
    <div class="input-area">
      <input id="input" placeholder="メッセージを入力">
      <button id="sendBtn">送信</button>
    </div>
  </div>
</div>

<script>
const chat = document.getElementById("chat");
const sendBtn = document.getElementById("sendBtn");

let history = [];

const characterPrompts = {
  aizawa: "強気で挑発的な女性",
  tejima: "優しく控えめな女性",
  matsugane: "余裕ある大人の女性",
  wacchi: "元気で積極的な女性",
  rangiku: "妖艶で余裕のある女性"
};

function addMessage(text, type, loading = false) {
  const div = document.createElement("div");
  div.className = "message " + type;
  if (loading) div.classList.add("loading");
  div.innerText = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

async function send() {
  const input = document.getElementById("input");
  const text = input.value;
  if (!text) return;

  const charKey = document.getElementById("character").value;
  const characterPrompt = characterPrompts[charKey];

  addMessage(text, "user");
  input.value = "";

  history.push({ role: "user", content: text });
  history = history.slice(-8);

  const loading = addMessage("考え中", "ai", true);
  loading.classList.add("dots");

  try {
    const res = await fetch("/api/deepseek", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        systemPrompt: characterPrompt,
        history
      })
    });

    const data = await res.json();
    loading.remove();

    if (!res.ok) {
      addMessage("エラー: " + JSON.stringify(data), "ai");
      return;
    }

    addMessage(data.reply, "ai");
    history.push({ role: "assistant", content: data.reply });

  } catch (e) {
    loading.remove();
    addMessage("通信エラー: " + e.message, "ai");
  }
}

sendBtn.addEventListener("click", send);

// Enter誤爆防止
document.getElementById("input").addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.isComposing) {
    e.preventDefault();
    send();
  }
});
</script>

</body>
</html>
