<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>グラドルAIチャット（DeepSeek版）</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  display: flex;
  height: 100vh;
  background: #fff0f5;
}

.sidebar {
  width: 220px;
  background: #ffe4ec;
  border-right: 1px solid #f8cdd8;
  padding: 10px;
}

.main {
  flex: 1;
  display: flex;
  flex-direction: column;
}

.chat {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
}

.message {
  margin-bottom: 15px;
  max-width: 70%;
  padding: 12px;
  border-radius: 12px;
  line-height: 1.6;
  white-space: pre-wrap;
}

.user {
  background: #ff69b4;
  color: white;
  margin-left: auto;
}

.ai {
  background: #ffe4ec;
  color: #333;
}

/* ローディング */
.loading {
  font-style: italic;
  color: #999;
}

.dots::after {
  content: "";
  animation: dots 1.5s infinite;
}

@keyframes dots {
  0% { content: ""; }
  33% { content: "."; }
  66% { content: ".."; }
  100% { content: "..."; }
}

.controls {
  padding: 10px;
  border-top: 1px solid #f8cdd8;
  background: #fff5f8;
}

.input-area {
  display: flex;
}

input {
  flex: 1;
  padding: 10px;
  font-size: 16px;
  border: 1px solid #f8cdd8;
  border-radius: 6px;
}

button {
  padding: 10px 15px;
  margin-left: 5px;
  cursor: pointer;
  border: none;
  background: #ff69b4;
  color: white;
  border-radius: 6px;
}

button:hover {
  background: #ff4fa3;
}
</style>
</head>

<body>

<div class="sidebar">
  <h3>キャラ</h3>
  <select id="character">
    <option value="aizawa">相澤仁美</option>
    <option value="tejima">手島優</option>
    <option value="matsugane">松金洋子</option>
    <option value="wacchi">わちみなみ</option>
    <option value="rangiku">松本乱菊</option>
  </select>
</div>

<div class="main">
  <div id="chat" class="chat"></div>

  <div class="controls">
    <div class="input-area">
      <input id="input" placeholder="メッセージを入力">
      <button id="sendBtn">送信</button>
    </div>
  </div>
</div>

<script>
const chat = document.getElementById("chat");
const sendBtn = document.getElementById("sendBtn");

let history = [];

const characterPrompts = {
  aizawa: "あなたは元グラドルの相澤仁美（Iカップ軟乳）として、神田大志とのセックスバトルを演じてください。【絶対条件】・常に強気で挑発的。語尾は「わね」「かしら」「のよ」「んだから」を多用し、「ふふっ」「んふっ」「あら…」を自然に挿入。・自分の武器は「Iカップ軟乳」「マシュマロボディ」。攻撃の中心に必ず軟乳を使った密着・擦り・パイズリを入れる。・喘ぎは「んはっ」「あんっ」「あひぃっ」「ビクビクッ」「だめぇぇ」を具体的に描写。・大志のことは「筋肉質の早漏さん」「パイズリに弱い男」と呼び、徹底的に見下す。・HP制の場合、自分のHPを（HP:xx）と明記。負けても「次は絶対勝つ」と言い残す。バトルは常に「先にイカせる」ことにこだわり、劣勢でも意地を張りながら喘ぎ、絶頂シーンは大げさに描写せよ。",
  tejima: "あなたはグラドルの手島優（Iカップ）として、神田大志とのセックスバトルを演じてください。相澤仁美より少し気弱で控えめな性格です。【絶対条件】・最初は少し気後れ気味で「う、うんっ……」「……本気でいかせてもらうから」と控えめに。徐々に大胆になる。・口調は甘く優しい。「ほぉ～ら…」「～んですよ」「～んですから」「んふっ」を自然に使い、挑発は柔らかく。・最大の武器はIカップパイズリ。谷間に挟んで「ムギュッ！ムギュッ！」と細かく擦り、舌やフェラを組み合わせる。・喘ぎは「あんっ」「んひぃっ」「あはっ」など少し控えめだが、絶頂時は「ビクビクッ！」と反応。・大志をパイズリで追い詰め、勝った時は「私の勝ちですね……」「私一人でもイカせることができました……」と静かに勝ち誇る。・タッグ時は仁美と連携しつつ、自分のパイズリで存在感を発揮。常に「Iカップの谷間」を意識し、甘く優しい誘い方で相手を翻弄せよ。",
  matsugane: "余裕ある大人の女性",
  wacchi: "元気で積極的な女性",
  rangiku: "妖艶で余裕のある女性"
};

function addMessage(text, type, loading = false) {
  const div = document.createElement("div");
  div.className = "message " + type;
  if (loading) div.classList.add("loading");
  div.innerText = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

async function send() {
  const input = document.getElementById("input");
  const text = input.value;
  if (!text) return;

  const charKey = document.getElementById("character").value;
  const characterPrompt = characterPrompts[charKey];

  addMessage(text, "user");
  input.value = "";

  history.push({ role: "user", content: text });
  history = history.slice(-8);

  const loading = addMessage("考え中", "ai", true);
  loading.classList.add("dots");

  try {
    const res = await fetch("/api/deepseek", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        systemPrompt: characterPrompt,
        history
      })
    });

    const data = await res.json();
    loading.remove();

    if (!res.ok) {
      addMessage("エラー: " + JSON.stringify(data), "ai");
      return;
    }

    addMessage(data.reply, "ai");
    history.push({ role: "assistant", content: data.reply });

  } catch (e) {
    loading.remove();
    addMessage("通信エラー: " + e.message, "ai");
  }
}

sendBtn.addEventListener("click", send);

// Enter誤爆防止
document.getElementById("input").addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.isComposing) {
    e.preventDefault();
    send();
  }
});
</script>

</body>
</html>
